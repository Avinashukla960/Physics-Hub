<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Motion Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card-bg {
            background-color: #1e293b; /* Slate 800 */
            border: 1px solid #334155; /* Slate 700 */
        }
        .simulation-container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 1000px;
        }
        #projectile-canvas {
            background-color: #0f172a;
            border-radius: 0.5rem;
            width: 100%;
            height: auto;
            aspect-ratio: 1.5 / 1;
        }
        /* Custom slider styles */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 5px;
            outline: none;
            transition: background 0.3s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #38bdf8;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #38bdf8;
            cursor: pointer;
            border-radius: 50%;
        }
        /* Disabled states */
        input[type="range"]:disabled {
            background: #475569;
        }
        input[type="range"]:disabled::-webkit-slider-thumb {
            background: #64748b;
        }
        input[type="range"]:disabled::-moz-range-thumb {
            background: #64748b;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Projectile Motion Simulation -->
    <div class="simulation-container p-4 sm:p-6 lg:p-8">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold text-white">Projectile Motion Simulation</h2>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Canvas -->
            <div class="lg:col-span-2">
                <canvas id="projectile-canvas"></canvas>
            </div>

            <!-- Controls -->
            <div class="flex flex-col space-y-4">
                <div class="card-bg p-4 rounded-lg">
                    <label for="angle" class="block mb-2 text-sm font-medium text-slate-300">Angle: <span id="angle-value" class="font-bold text-sky-400">45°</span></label>
                    <input type="range" id="angle" min="0" max="90" value="45" class="w-full">
                </div>
                <div class="card-bg p-4 rounded-lg">
                    <label for="velocity" class="block mb-2 text-sm font-medium text-slate-300">Initial Velocity: <span id="velocity-value" class="font-bold text-sky-400">50 m/s</span></label>
                    <input type="range" id="velocity" min="10" max="100" value="50" class="w-full">
                </div>
                
                <div class="flex items-center space-x-2">
                    <button id="start-sim-btn" class="w-full text-center py-3 px-4 rounded-lg font-semibold bg-sky-500 text-slate-900 hover:bg-sky-400 transition-colors">Fire</button>
                    <button id="reset-sim-btn" class="w-full text-center py-3 px-4 rounded-lg font-semibold bg-slate-600 text-slate-200 hover:bg-slate-500 transition-colors">Reset</button>
                </div>

                <div class="card-bg p-4 rounded-lg space-y-2 text-sm">
                     <div class="flex justify-between"><span>Max Height:</span> <span id="max-height-val" class="font-mono text-sky-400">0.00 m</span></div>
                     <div class="flex justify-between"><span>Range:</span> <span id="range-val" class="font-mono text-sky-400">0.00 m</span></div>
                     <div class="flex justify-between"><span>Time of Flight:</span> <span id="time-val" class="font-mono text-sky-400">0.00 s</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // --- Projectile Motion Simulation Script ---
        
        // Simulation controls
        const angleSlider = document.getElementById('angle');
        const velocitySlider = document.getElementById('velocity');
        const angleValue = document.getElementById('angle-value');
        const velocityValue = document.getElementById('velocity-value');
        const startBtn = document.getElementById('start-sim-btn');
        const resetBtn = document.getElementById('reset-sim-btn');

        const maxHeightVal = document.getElementById('max-height-val');
        const rangeVal = document.getElementById('range-val');
        const timeVal = document.getElementById('time-val');

        // Canvas setup
        const canvas = document.getElementById('projectile-canvas');
        const ctx = canvas.getContext('2d');

        // Simulation variables
        let angle = 45;
        let velocity = 50;
        const g = 9.81; // gravity
        let isSimulating = false;
        let animationFrameId;
        let path = [];
        let startTime;
        let scale = 1; // pixels per meter

        function updateSliderValues() {
            angle = parseFloat(angleSlider.value);
            velocity = parseFloat(velocitySlider.value);
            angleValue.textContent = `${angle.toFixed(0)}°`;
            velocityValue.textContent = `${velocity.toFixed(0)} m/s`;
        }

        angleSlider.addEventListener('input', updateSliderValues);
        velocitySlider.addEventListener('input', updateSliderValues);

        function setupCanvas() {
            const container = canvas.parentElement;
            const containerWidth = container.getBoundingClientRect().width;
            
            // Guard against the canvas having no size, which can cause errors.
            if (containerWidth === 0) return;

            canvas.width = containerWidth;
            canvas.height = containerWidth / 1.5; // Maintain aspect ratio
            resetSimulation();
        }

        function drawGrid() {
            ctx.strokeStyle = '#1e293b'; // Slate 800
            ctx.lineWidth = 1;

            const maxRange = (velocity * velocity * Math.sin(2 * (angle * Math.PI / 180))) / g;
            const maxHeight = (velocity * velocity * Math.pow(Math.sin(angle * Math.PI / 180), 2)) / (2 * g);
            
            const calculatedScaleX = (maxRange > 0) ? canvas.width / (maxRange * 1.2) : 1;
            const calculatedScaleY = (maxHeight > 0) ? canvas.height / (maxHeight * 1.2) : 1;
            scale = Math.min(calculatedScaleX, calculatedScaleY);
            if (!isFinite(scale) || scale < 0.01) scale = 1;

            const maxDim = Math.max(canvas.width / scale, canvas.height / scale);
            const gridSpacingMeters = Math.pow(10, Math.floor(Math.log10(maxDim / 5) || 0));
            const gridSpacingPixels = gridSpacingMeters * scale;


            if (gridSpacingPixels > 5) {
                for (let x = 0; x < canvas.width; x += gridSpacingPixels) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += gridSpacingPixels) {
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height - y);
                    ctx.lineTo(canvas.width, canvas.height - y);
                    ctx.stroke();
                }
            }
        }

        function drawPath() {
            ctx.beginPath();
            ctx.strokeStyle = '#38bdf8'; // Sky 400
            ctx.lineWidth = 2;
            for (let i = 0; i < path.length; i++) {
                const p = path[i];
                const canvasX = p.x * scale;
                const canvasY = canvas.height - (p.y * scale);
                if (i === 0) {
                    ctx.moveTo(canvasX, canvasY);
                } else {
                    ctx.lineTo(canvasX, canvasY);
                }
            }
            ctx.stroke();
        }
        
        function drawProjectile(x, y) {
            const canvasX = x * scale;
            const canvasY = canvas.height - (y * scale);
            ctx.beginPath();
            ctx.arc(canvasX, canvasY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#f0f9ff'; // Sky 50
            ctx.fill();
        }
        
        function setControlsEnabled(enabled) {
            startBtn.disabled = !enabled;
            angleSlider.disabled = !enabled;
            velocitySlider.disabled = !enabled;
        }

        function resetSimulation() {
            isSimulating = false;
            cancelAnimationFrame(animationFrameId);
            path = [];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            maxHeightVal.textContent = '0.00 m';
            rangeVal.textContent = '0.00 m';
            timeVal.textContent = '0.00 s';
            
            setControlsEnabled(true);
        }

        function startSimulation() {
            if (isSimulating) return;

            // Reset state for the new simulation run without a full UI reset
            cancelAnimationFrame(animationFrameId);
            path = [];
            maxHeightVal.textContent = '0.00 m';
            rangeVal.textContent = '0.00 m';
            timeVal.textContent = '0.00 s';

            isSimulating = true;
            setControlsEnabled(false);
            startTime = performance.now();
            
            const angleRad = angle * Math.PI / 180;
            const vx = velocity * Math.cos(angleRad);
            const vy = velocity * Math.sin(angleRad);
            
            let currentMaxHeight = 0;

            function animate(currentTime) {
                if (!isSimulating) return;

                const t = (currentTime - startTime) / 1000;
                
                const x = vx * t;
                const y = (vy * t) - (0.5 * g * t * t);
                
                if (y > currentMaxHeight) {
                    currentMaxHeight = y;
                }

                if (y < 0) {
                    isSimulating = false;
                    const totalTime = (2 * vy) / g;
                    const range = vx * totalTime;
                    
                    maxHeightVal.textContent = `${currentMaxHeight.toFixed(2)} m`;
                    rangeVal.textContent = `${range.toFixed(2)} m`;
                    timeVal.textContent = `${totalTime.toFixed(2)} s`;
                    
                    path.push({x: range, y: 0});
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawGrid();
                    drawPath();
                    drawProjectile(range, 0);
                    
                    setControlsEnabled(true);
                    return;
                }

                path.push({x, y});
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGrid();
                drawPath();
                drawProjectile(x, y);

                animationFrameId = requestAnimationFrame(animate);
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', startSimulation);
        resetBtn.addEventListener('click', () => {
             // Sliders are source of truth, no need to call updateSliderValues()
             setupCanvas();
        });
        
        window.addEventListener('resize', setupCanvas);

        // Initial setup on page load
        document.addEventListener('DOMContentLoaded', () => {
            updateSliderValues();
            setupCanvas();
        });

    </script>

</body>
</html>
